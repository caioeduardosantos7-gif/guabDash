-
  request:
    url: /api/dashboard/stats
    method: GET
  response:
    status: 200
    headers:
      content-type: application/json
    body: >
      {
        "totalProducts":    { "labelKey": "dashboard.totalProducts",   "value": "250", "delta": "+2,5%", "up": true },
        "completedOrders":  { "labelKey": "dashboard.completedOrders", "value": "124", "delta": "+2,5%", "up": true },
        "cancelledOrders":  { "labelKey": "dashboard.cancelledOrders", "value": "14",  "delta": "-1,5%", "up": false },
        "bestProducts":     { "labelKey": "dashboard.bestProducts",    "value": "119", "delta": "+2,5%", "up": true }
      }

-
